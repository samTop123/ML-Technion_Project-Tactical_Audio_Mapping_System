<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תמ"ק - התחברות למערכת</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #1a252f; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>מערכת תמ"ק</h2>
        <p>תמונת מצב קולית</p>
        <form method="POST" action="/">
            <input type="text" name="username" placeholder="שם משתמש (למשל soldier1)" required>
            <input type="password" name="password" placeholder="סיסמה" required>
            <button type="submit">התחבר</button>
        </form>
    </div>
</body>
</html>
