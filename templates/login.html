<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תמ"ק - התחברות למערכת</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Heebo', sans-serif; 
            background: linear-gradient(135deg, #1e272e 0%, #2f3542 100%); 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff;
        }
        .login-box { 
            background: rgba(47, 53, 66, 0.8); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            width: 320px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .login-box h2 { margin-top: 0; color: #00d2d3; letter-spacing: 1px; }
        .login-box p { color: #c8d6e5; margin-bottom: 25px; font-size: 14px; }
        input { 
            width: 90%; padding: 12px; margin: 10px 0; 
            border: 1px solid #576574; border-radius: 6px; 
            background: rgba(34, 47, 62, 0.6); color: white;
            font-family: 'Heebo', sans-serif;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #00d2d3; box-shadow: 0 0 8px rgba(0, 210, 211, 0.3); }
        button { 
            width: 100%; padding: 12px; margin-top: 15px;
            background: linear-gradient(90deg, #10ac84 0%, #1dd1a1 100%); 
            color: white; border: none; border-radius: 6px; 
            cursor: pointer; font-size: 16px; font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(29, 209, 161, 0.4); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>מערכת תמ"ק</h2>
        <p>תמונת מצב קולית - התחברות מאובטחת</p>
        <form method="POST" action="/">
            <input type="text" name="username" placeholder="שם משתמש (למשל soldier1)" required>
            <input type="password" name="password" placeholder="סיסמה" required>
            <button type="submit">היכנס למערכת</button>
        </form>
    </div>
</body>
</html>
