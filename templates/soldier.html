<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיפוי סביבה קולית - עמדת החייל</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Heebo', sans-serif; text-align: center; margin: 0; 
            background-color: #1e272e; color: #ecf0f1;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .container { 
            background: #2f3640; padding: 40px 30px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px;
            border-top: 4px solid #10ac84;
        }
        h2 { margin-top: 0; color: #10ac84; }
        .status { 
            margin: 25px 0; font-size: 20px; font-weight: bold; color: #bdc3c7; 
            background: #353b48; padding: 15px; border-radius: 8px;
            transition: all 0.3s ease;
        }
        button { 
            padding: 18px 30px; font-size: 18px; font-weight: bold; cursor: pointer; 
            border: none; border-radius: 50px; background-color: #10ac84; color: white; 
            box-shadow: 0 4px 15px rgba(16, 172, 132, 0.4);
            transition: all 0.3s ease; width: 100%;
            font-family: 'Heebo', sans-serif;
        }
        button:hover { background-color: #1dd1a1; transform: scale(1.02); }
        button.recording { 
            background-color: #ff4757; 
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            animation: pulse-red 1.5s infinite; 
        }
        a.logout { 
            display: inline-block; margin-top: 25px; color: #7f8fa6; text-decoration: none; font-size: 14px; transition: color 0.3s;
        }
        a.logout:hover { color: #f5f6fa; }
        
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>מזהה כוח: {{ username }}</h2>
        <div class="status" id="statusText">המערכת ממתינה...</div>
        <button id="recordBtn" onclick="toggleRecording()">התחל שידור חי למפקד</button>
        <a href="/logout" class="logout">התנתק מהמערכת</a>
    </div>

    <script>
        let isRecording = false;
        let mediaRecorder;
        const RECORD_DURATION = 4000; 

        async function startAudioCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
                function recordAndSend() {
                    if (!isRecording) return;
            
                    mediaRecorder = new RecordRTC(stream, {
                        type: 'audio',
                        mimeType: 'audio/wav',
                        recorderType: RecordRTC.StereoAudioRecorder,
                        desiredSampRate: 22050 
                    });
            
                    mediaRecorder.startRecording();
            
                    setTimeout(() => {
                        if (!isRecording) {
                            mediaRecorder.stopRecording();
                            return;
                        }
                
                        mediaRecorder.stopRecording(() => {
                            let blob = mediaRecorder.getBlob();
                            sendAudioToServer(blob);
                    
                            recordAndSend();
                        });
                    }, RECORD_DURATION);
                }
        
                recordAndSend();

            } catch (err) {
                alert("שגיאה בגישה למיקרופון: " + err);
                toggleRecording();
            }
        }

        function toggleRecording() {
            const btn = document.getElementById("recordBtn");
            const statusText = document.getElementById("statusText");

            if (!isRecording) {
                isRecording = true;
                btn.textContent = "עצור שידור";
                btn.classList.add("recording");
                statusText.innerHTML = "🔴 משדר סאונד טקטי למוקד...";
                statusText.style.color = "#ff4757";
                statusText.style.border = "1px solid #ff4757";
                startAudioCapture();
            } else {
                isRecording = false;
                btn.textContent = "התחל שידור חי למפקד";
                btn.classList.remove("recording");
                statusText.innerHTML = "המערכת ממתינה...";
                statusText.style.color = "#bdc3c7";
                statusText.style.border = "none";
                if (mediaRecorder) {
                    mediaRecorder.stopRecording();
                }
            }
        }

        function sendAudioToServer(blob) {
            const formData = new FormData();
            formData.append("file", blob, "live_audio.wav");
            formData.append("username", "{{ username }}");

            fetch("/predict", {
                method: "POST",
                body: formData
            }).then(response => response.json())
            .then(data => console.log("סטטוס מהשרת:", data))
            .catch(error => console.error("שגיאה בשליחה:", error));
        }
    </script>
</body>
</html>
